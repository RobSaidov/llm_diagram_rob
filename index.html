<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thought Spores</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-base: #f6f0e4;
      --bg-accent: #fce4cf;
      --ink: #1f2a37;
      --ink-soft: #4f5d70;
      --panel: rgba(255, 255, 255, 0.72);
      --panel-border: rgba(38, 48, 62, 0.12);
      --focus: #ef8354;
      --reframe: #3cb179;
      --analogy: #2274a5;
      --challenge: #e4572e;
      --assumption: #f3a712;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      color: var(--ink);
      font-family: "Outfit", sans-serif;
      overflow: hidden;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.55), transparent 42%),
        radial-gradient(circle at 85% 30%, rgba(255, 223, 191, 0.8), transparent 48%),
        linear-gradient(120deg, var(--bg-base), var(--bg-accent));
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto auto -150px -120px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: rgba(60, 177, 121, 0.14);
      filter: blur(1px);
      animation: drift 14s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      inset: -120px -130px auto auto;
      background: rgba(34, 116, 165, 0.15);
      width: 320px;
      height: 320px;
      animation-duration: 19s;
      animation-direction: alternate-reverse;
    }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    #center {
      position: absolute;
      top: 50%;
      left: 50%;
      width: min(680px, calc(100vw - 32px));
      transform: translate(-50%, -50%);
      background: var(--panel);
      backdrop-filter: blur(10px);
      border: 1px solid var(--panel-border);
      border-radius: 26px;
      padding: 26px;
      box-shadow: 0 18px 48px rgba(26, 35, 49, 0.13);
      text-align: center;
      animation: reveal 0.7s ease;
    }

    h1 {
      margin: 0 0 8px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(1.8rem, 3vw, 2.3rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 20px;
      color: var(--ink-soft);
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    input {
      width: min(420px, 100%);
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(38, 48, 62, 0.2);
      font-size: 15px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.9);
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    input:focus {
      outline: none;
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(239, 131, 84, 0.18);
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      font-family: "Space Grotesk", sans-serif;
      font-size: 0.95rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    #launchBtn {
      background: linear-gradient(135deg, #e4572e, #ef8354);
      color: white;
      box-shadow: 0 10px 24px rgba(228, 87, 46, 0.3);
    }

    #resetBtn {
      background: rgba(31, 42, 55, 0.09);
      color: var(--ink);
      opacity: 0;
      pointer-events: none;
    }

    #resetBtn.active {
      opacity: 1;
      pointer-events: all;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .spore {
      position: absolute;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.83rem;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      color: white;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.12);
      transform: translate(-50%, -50%) scale(0.84);
      opacity: 0;
      transition: transform 0.24s ease;
      animation: sporeIn 0.38s ease forwards;
    }

    .spore:hover {
      transform: translate(-50%, -50%) scale(1.05);
      z-index: 3;
    }

    .spore.pinned {
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
      outline: 2px solid rgba(255, 255, 255, 0.8);
      z-index: 4;
    }

    .reframe {
      background: var(--reframe);
    }

    .analogy {
      background: var(--analogy);
    }

    .challenge {
      background: var(--challenge);
    }

    .assumption {
      background: var(--assumption);
      color: #202020;
    }

    #legend {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: 16px;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.78rem;
      color: var(--ink-soft);
      pointer-events: none;
    }

    .tag {
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(38, 48, 62, 0.12);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    @keyframes reveal {
      from {
        opacity: 0;
        transform: translate(-50%, -50%) translateY(14px);
      }

      to {
        opacity: 1;
        transform: translate(-50%, -50%) translateY(0);
      }
    }

    @keyframes sporeIn {
      to {
        opacity: 0.96;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes drift {
      0%,
      100% {
        transform: translate(0, 0);
      }

      50% {
        transform: translate(20px, -26px);
      }
    }

    @media (max-width: 640px) {
      #center {
        padding: 20px;
        border-radius: 20px;
      }

      h1 {
        font-size: 1.6rem;
      }

      p {
        font-size: 0.9rem;
      }

      .controls {
        gap: 8px;
      }

      input,
      button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div id="stage">
    <div id="center">
      <h1>Thought Spores</h1>
      <p>Drop in a question. Click any floating thought to pin it and branch into new directions.</p>
      <div class="controls">
        <input id="prompt" maxlength="120" placeholder="How might I design onboarding for remote interns?" />
        <button id="launchBtn" type="button">Visualize</button>
        <button id="resetBtn" type="button">Reset</button>
      </div>
    </div>

    <div id="legend">
      <span class="tag"><span class="dot" style="background:#3cb179"></span>reframe</span>
      <span class="tag"><span class="dot" style="background:#2274a5"></span>analogy</span>
      <span class="tag"><span class="dot" style="background:#e4572e"></span>challenge</span>
      <span class="tag"><span class="dot" style="background:#f3a712"></span>assumption</span>
    </div>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const center = document.getElementById("center");
    const promptInput = document.getElementById("prompt");
    const launchBtn = document.getElementById("launchBtn");
    const resetBtn = document.getElementById("resetBtn");

    const maxSpores = 80;
    const driftLimit = 1.9;
    let spores = [];
    let isAnimating = false;
    let rootIdea = "idea";

    const types = [
      {
        name: "reframe",
        color: "reframe",
        stems: [
          "What if we optimize for",
          "Could this be about",
          "Another lens is",
          "A better objective might be"
        ]
      },
      {
        name: "analogy",
        color: "analogy",
        stems: [
          "Like a newsroom:",
          "Like a pop-up market:",
          "Think beehive:",
          "Borrow from game design:"
        ]
      },
      {
        name: "challenge",
        color: "challenge",
        stems: [
          "What breaks if",
          "Who is excluded when",
          "What risk appears if",
          "What is the hidden cost of"
        ]
      },
      {
        name: "assumption",
        color: "assumption",
        stems: [
          "Are we assuming",
          "Do we really need",
          "Must it always be",
          "What if less of"
        ]
      }
    ];

    const filler = [
      "speed",
      "clarity",
      "trust",
      "ritual",
      "feedback",
      "ownership",
      "friction",
      "surprise",
      "adaptation",
      "confidence"
    ];

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function coreWords(raw) {
      const cleaned = raw
        .toLowerCase()
        .replace(/[^a-z0-9\s]/g, " ")
        .split(/\s+/)
        .filter(Boolean);

      return cleaned.slice(0, 3);
    }

    function buildPhrase(type, seedText) {
      const stem = pickRandom(type.stems);
      const words = coreWords(seedText);
      const bit = words.length ? pickRandom(words) : pickRandom(filler);
      return `${stem} ${bit}`;
    }

    function toggleControls(active) {
      if (active) {
        resetBtn.classList.add("active");
        center.style.opacity = "0.12";
      } else {
        resetBtn.classList.remove("active");
        center.style.opacity = "1";
      }
    }

    function launch() {
      if (spores.length > 0) {
        clearSpores();
      }

      rootIdea = promptInput.value.trim() || "new idea";
      const centerX = window.innerWidth / 2;
      const centerY = window.innerHeight / 2;

      for (let i = 0; i < 14; i += 1) {
        const angle = (Math.PI * 2 * i) / 14;
        createSpore(rootIdea, centerX + Math.cos(angle) * 8, centerY + Math.sin(angle) * 8);
      }

      toggleControls(true);

      if (!isAnimating) {
        isAnimating = true;
        requestAnimationFrame(animate);
      }
    }

    function createSpore(seed, x = window.innerWidth / 2, y = window.innerHeight / 2) {
      if (spores.length >= maxSpores) {
        return;
      }

      const type = pickRandom(types);
      const el = document.createElement("div");
      el.className = `spore ${type.color}`;
      el.textContent = buildPhrase(type, seed);
      stage.appendChild(el);

      const spore = {
        el,
        type,
        x,
        y,
        vx: (Math.random() - 0.5) * 1.4,
        vy: (Math.random() - 0.5) * 1.4,
        pinned: false,
        seeded: false
      };

      spore.el.style.left = `${spore.x}px`;
      spore.el.style.top = `${spore.y}px`;

      spore.el.addEventListener("click", () => pinSpore(spore));
      spores.push(spore);
    }

    function pinSpore(spore) {
      if (spore.pinned) {
        return;
      }

      spore.pinned = true;
      spore.vx = 0;
      spore.vy = 0;
      spore.el.classList.add("pinned");

      if (!spore.seeded) {
        spore.seeded = true;

        for (let i = 0; i < 3; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const radius = 64 + Math.random() * 44;
          const childX = spore.x + Math.cos(angle) * radius;
          const childY = spore.y + Math.sin(angle) * radius;
          createSpore(spore.el.textContent || rootIdea, childX, childY);
        }
      }
    }

    function animate() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      spores.forEach((s) => {
        if (!s.pinned) {
          s.vx += (Math.random() - 0.5) * 0.028;
          s.vy += (Math.random() - 0.5) * 0.028;

          s.vx = Math.max(Math.min(s.vx, driftLimit), -driftLimit);
          s.vy = Math.max(Math.min(s.vy, driftLimit), -driftLimit);

          s.x += s.vx;
          s.y += s.vy;

          const margin = 18;
          if (s.x < margin || s.x > w - margin) {
            s.vx *= -0.95;
            s.x = Math.max(margin, Math.min(w - margin, s.x));
          }
          if (s.y < margin || s.y > h - margin) {
            s.vy *= -0.95;
            s.y = Math.max(margin, Math.min(h - margin, s.y));
          }

          s.el.style.left = `${s.x}px`;
          s.el.style.top = `${s.y}px`;
        }
      });

      requestAnimationFrame(animate);
    }

    function clearSpores() {
      spores.forEach((s) => s.el.remove());
      spores = [];
      toggleControls(false);
    }

    launchBtn.addEventListener("click", launch);
    resetBtn.addEventListener("click", clearSpores);
    promptInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        launch();
      }
    });

    window.addEventListener("resize", () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      spores.forEach((s) => {
        s.x = Math.max(24, Math.min(w - 24, s.x));
        s.y = Math.max(24, Math.min(h - 24, s.y));
        s.el.style.left = `${s.x}px`;
        s.el.style.top = `${s.y}px`;
      });
    });
  </script>
</body>
</html>
